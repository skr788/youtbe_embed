<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <video id="v" controls muted autoplay playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script>
        // ✅ Cambia esto por tu URL de Cloudflare Worker
        const WORKER_URL = "https://d746-177-222-112-28.ngrok-free.app";

        const params = new URLSearchParams(location.search);
        const videoId = params.get("v") || "e34xb-Fbl0U";
        const m3u8Raw = params.get("m3u8");
        const m3u8Original = m3u8Raw ? decodeURIComponent(m3u8Raw) : null;
        const video = document.getElementById("v");

        function usarYouTubeFallback() {
            video.remove();
            const iframe = document.createElement("iframe");
            iframe.style.cssText = "width:100%;height:100%;border:0;position:absolute;top:0;left:0";
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=1&rel=0`;
            iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
            iframe.setAttribute("allowfullscreen", "true");
            document.body.appendChild(iframe);
        }

        if (m3u8Original && typeof Hls !== "undefined" && Hls.isSupported()) {
            const m3u8Proxy = `${WORKER_URL}/?url=${encodeURIComponent(m3u8Original)}`;
        
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                // ✅ Agregar header para saltar la advertencia de ngrok
                xhrSetup: function(xhr, url) {
                    xhr.setRequestHeader("ngrok-skip-browser-warning", "true");
                }
            });
        
            hls.loadSource(m3u8Proxy);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            hls.on(Hls.Events.ERROR, (_, data) => {
                console.error("HLS error:", data.type, data.details);
                if (data.fatal) usarYouTubeFallback();
            });
} else {
            usarYouTubeFallback();
        }
    </script>
</body>
</html>
