<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #error { color: #fff; padding: 20px; font-family: sans-serif; display: none; }
    </style>
</head>
<body>
    <video id="v" controls muted autoplay playsinline></video>
    <div id="error"></div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const videoId = params.get("v") || "e34xb-Fbl0U";
        const m3u8Raw = params.get("m3u8");
        const m3u8 = m3u8Raw ? decodeURIComponent(m3u8Raw) : null;
        const video = document.getElementById("v");
        const errorDiv = document.getElementById("error");

        function usarYouTubeFallback() {
            video.remove();
            const iframe = document.createElement("iframe");
            iframe.style.cssText = "width:100%;height:100%;border:0;position:absolute;top:0;left:0";
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=1&rel=0`;
            iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share");
            iframe.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
            iframe.setAttribute("allowfullscreen", "true");
            document.body.appendChild(iframe);
        }

        if (m3u8 && typeof Hls !== "undefined" && Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
            });
            hls.loadSource(m3u8);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            hls.on(Hls.Events.ERROR, (_, data) => {
                console.error("HLS error:", data.type, data.details);
                if (data.fatal) {
                    // Si falla hls.js, caer al iframe de YouTube
                    usarYouTubeFallback();
                }
            });
        } else if (video.canPlayType("application/vnd.apple.mpegurl") && m3u8) {
            // Safari — HLS nativo
            video.src = m3u8;
            video.play().catch(() => {});
        } else {
            // Fallback YouTube iframe
            usarYouTubeFallback();
        }
    </script>
</body>
</html>
